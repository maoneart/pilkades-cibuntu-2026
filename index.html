/**
 * Handle HTTP GET Requests (Digunakan untuk penarikan real-time data)
 */
function doGet(e) {
  const headers = {
    "Access-Control-Allow-Origin": "*",
    "Access-Control-Allow-Methods": "GET, POST",
    "Access-Control-Allow-Headers": "Content-Type"
  };
  
  try {
    const action = e.parameter.action || 'read';
    
    if (action === 'read') {
      const data = getAllData();
      return ContentService.createTextOutput(JSON.stringify({ success: true, data: data }))
        .setMimeType(ContentService.MimeType.JSON);
    }
    
    return ContentService.createTextOutput(JSON.stringify({ success: false, error: 'Aksi GET tidak valid' }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ success: false, error: error.toString() }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

/**
 * Handle HTTP POST Requests (Digunakan untuk input form TPS baru / delete)
 */
function doPost(e) {
  try {
    let params;
    if (e.postData && e.postData.contents) {
      params = JSON.parse(e.postData.contents);
    } else {
      params = e.parameter;
    }
    
    const action = params.action;
    
    if (action === 'submit') {
      const result = submitTPSData(params.data);
      // Setiap ada submit baru, picu penghitungan rekap otomatis untuk efisiensi eksekusi
      recalculatePercentages();
      return ContentService.createTextOutput(JSON.stringify({ success: true, result: result }))
        .setMimeType(ContentService.MimeType.JSON);
    } else if (action === 'delete') {
      const result = deleteTPSData(params.tps);
      recalculatePercentages();
      return ContentService.createTextOutput(JSON.stringify({ success: true, result: result }))
        .setMimeType(ContentService.MimeType.JSON);
    }
    
    return ContentService.createTextOutput(JSON.stringify({ success: false, error: 'Aksi POST tidak valid' }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (error) {
    return ContentService.createTextOutput(JSON.stringify({ success: false, error: error.toString() }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

/**
 * Membaca seluruh data dari kedua Sheet database
 */
function getAllData() {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheetInput = ss.getSheetByName('input_suara') || initInputSheet(ss);
  const sheetRekap = ss.getSheetByName('rekap_persentase') || initRekapSheet(ss);
  
  const inputRows = sheetInput.getDataRange().getValues();
  const rekapRows = sheetRekap.getDataRange().getValues();
  
  const inputHeaders = inputRows[0];
  const inputData = [];
  for (let i = 1; i < inputRows.length; i++) {
    const row = inputRows[i];
    if (!row[0]) continue; // Lewati jika nama TPS kosong
    const obj = {};
    inputHeaders.forEach((header, index) => {
      obj[header] = row[index];
    });
    inputData.push(obj);
  }
  
  const rekapHeaders = rekapRows[0];
  const rekapData = [];
  for (let i = 1; i < rekapRows.length; i++) {
    const row = rekapRows[i];
    if (!row[0]) continue; // Lewati jika nama kandidat kosong
    const obj = {};
    rekapHeaders.forEach((header, index) => {
      obj[header] = row[index];
    });
    rekapData.push(obj);
  }
  
  return {
    input_suara: inputData,
    rekap_persentase: rekapData
  };
}

/**
 * Memasukkan atau memperbarui baris data TPS ke lembar kerja 'input_suara'
 */
function submitTPSData(data) {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheet = ss.getSheetByName('input_suara') || initInputSheet(ss);
  const rows = sheet.getDataRange().getValues();
  
  const tpsName = data.TPS;
  let tpsRowIndex = -1;
  
  // Mencari jika data TPS sudah terdaftar sebelumnya untuk mode Update
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][0].toString().toLowerCase() === tpsName.toString().toLowerCase()) {
      tpsRowIndex = i + 1; // Konversi ke baris Excel (berbasis index 1)
      break;
    }
  }
  
  // Perhitungan formula matang di sisi server untuk menjaga integritas data
  const suaraSah = Number(data["Kanididat 1"] || 0) + 
                   Number(data["Kandidat 2"] || 0) + 
                   Number(data["Kandidat 3"] || 0) + 
                   Number(data["Kandidat 4"] || 0);
                   
  const pemilihHadir = suaraSah + Number(data["Tidak Sah"] || 0);
  const pemilihTidakHadir = Math.max(0, Number(data.DPT || 0) - pemilihHadir);
  const golput = pemilihTidakHadir; // Golput merepresentasikan pemilih yang absen/tidak menyalurkan suara sah/tidak sah secara fisik
  
  const rowValues = [
    tpsName,
    data["Ketua TPS"] || "Belum Diisi",
    Number(data.DPT || 0),
    golput,
    Number(data["Tidak Sah"] || 0),
    Number(data["Kanididat 1"] || 0),
    Number(data["Kandidat 2"] || 0),
    Number(data["Kandidat 3"] || 0),
    Number(data["Kandidat 4"] || 0),
    suaraSah,
    pemilihHadir,
    pemilihTidakHadir
  ];
  
  if (tpsRowIndex !== -1) {
    // Mode Update Row
    sheet.getRange(tpsRowIndex, 1, 1, rowValues.length).setValues([rowValues]);
    return "Data TPS berhasil diperbarui!";
  } else {
    // Mode Append Row Baru
    sheet.appendRow(rowValues);
    return "Data TPS baru berhasil disimpan!";
  }
}

/**
 * Menghapus baris data TPS
 */
function deleteTPSData(tpsName) {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheet = ss.getSheetByName('input_suara');
  if (!sheet) return "Sheet tidak ditemukan";
  
  const rows = sheet.getDataRange().getValues();
  for (let i = 1; i < rows.length; i++) {
    if (rows[i][0].toString().toLowerCase() === tpsName.toString().toLowerCase()) {
      sheet.deleteRow(i + 1);
      return "Berhasil menghapus " + tpsName;
    }
  }
  return "Data TPS tidak ditemukan";
}

/**
 * Mengalkulasi ulang seluruh perolehan suara total dan meng-update 'rekap_persentase' secara batch
 */
function recalculatePercentages() {
  const ss = SpreadsheetApp.openById(SPREADSHEET_ID);
  const sheetInput = ss.getSheetByName('input_suara') || initInputSheet(ss);
  const sheetRekap = ss.getSheetByName('rekap_persentase') || initRekapSheet(ss);
  
  const inputRows = sheetInput.getDataRange().getValues();
  
  let totalKand1 = 0;
  let totalKand2 = 0;
  let totalKand3 = 0;
  let totalKand4 = 0;
  
  // Agregasi suara dari seluruh TPS
  for (let i = 1; i < inputRows.length; i++) {
    if (!inputRows[i][0]) continue;
    totalKand1 += Number(inputRows[i][5] || 0); // Kolom Kanididat 1
    totalKand2 += Number(inputRows[i][6] || 0); // Kolom Kandidat 2
    totalKand3 += Number(inputRows[i][7] || 0); // Kolom Kandidat 3
    totalKand4 += Number(inputRows[i][8] || 0); // Kolom Kandidat 4
  }
  
  const totalSeluruhSuara = totalKand1 + totalKand2 + totalKand3 + totalKand4;
  
  const pct1 = totalSeluruhSuara > 0 ? (totalKand1 / totalSeluruhSuara) * 100 : 0;
  const pct2 = totalSeluruhSuara > 0 ? (totalKand2 / totalSeluruhSuara) * 100 : 0;
  const pct3 = totalSeluruhSuara > 0 ? (totalKand3 / totalSeluruhSuara) * 100 : 0;
  const pct4 = totalSeluruhSuara > 0 ? (totalKand4 / totalSeluruhSuara) * 100 : 0;
  
  const rekapRows = sheetRekap.getDataRange().getValues();
  
  // Update data suara & persentase di lembar 'rekap_persentase'
  // Kandidat 1 berasumsi di baris ke-2 (rekapRows[1]), dst.
  if (rekapRows.length >= 5) {
    sheetRekap.getRange(2, 5, 1, 2).setValues([[totalKand1, pct1.toFixed(1) + "%"]]);
    sheetRekap.getRange(3, 5, 1, 2).setValues([[totalKand2, pct2.toFixed(1) + "%"]]);
    sheetRekap.getRange(4, 5, 1, 2).setValues([[totalKand3, pct3.toFixed(1) + "%"]]);
    sheetRekap.getRange(5, 5, 1, 2).setValues([[totalKand4, pct4.toFixed(1) + "%"]]);
  }
}

                            className="w-full px-3 py-1.5 border border-blue-200 rounded-lg text-sm font-semibold outline-none focus:ring-2 focus:ring-blue-500"

                        </div>
                        <div className="p-3 bg-teal-50/50 rounded-xl border border-teal-100">
                          <label className="block text-[11px] font-bold text-teal-900 mb-1">

                          <input
                            type="number"
                            min="0"
                            value={formKand2}
                            onChange={(e) =>
                              setFormKand2(Number(e.target.value))

                          />
                        </div>
                        <div className="p-3 bg-amber-50/50 rounded-xl border border-amber-100">
                          <label className="block text-[11px] font-bold text-amber-950 mb-1">
                            Kandidat 3
                          </label>
                          <input
                            type="number"
                            min="0"
                            value={formKand3}
                            onChange={(e) =>
                              setFormKand3(Number(e.target.value))
                            }
                            className="w-full px-3 py-1.5 border border-amber-200 rounded-lg text-sm font-semibold outline-none focus:ring-2 focus:ring-amber-500"
                          />
                        </div>
                        <div className="p-3 bg-rose-50/50 rounded-xl border border-rose-100">
                          <label className="block text-[11px] font-bold text-rose-900 mb-1">
                            Kandidat 4
                          </label>
                          <input
                            type="number"
                            min="0"
                            value={formKand4}
                            onChange={(e) =>
                              setFormKand4(Number(e.target.value))
                            }
                            className="w-full px-3 py-1.5 border border-rose-200 rounded-lg text-sm font-semibold outline-none focus:ring-2 focus:ring-rose-500"
                          />
                        </div>
                      </div>
                    </div>

                    {/* Additional Fields & Live Summary */}
                    <div className="border-t border-slate-100 pt-5 grid grid-cols-1 md:grid-cols-2 gap-6">
                      <div>
                        <label className="block text-xs font-bold text-slate-600 uppercase mb-1.5">
                          Suara Tidak Sah (Kertas Rusak/Abstain) *
                        </label>
                        <input
                          type="number"
                          min="0"
                          value={formTidakSah}
                          onChange={(e) =>
                            setFormTidakSah(Number(e.target.value))
                          }
                          className="w-full px-3.5 py-2 border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                        />
                      </div>

                      {/* Dynamic Math Verification Box */}
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200 space-y-2 text-xs">
                        <span className="font-bold text-slate-800 uppercase text-[10px] tracking-wider block">
                          Verifikasi Perhitungan Real-Time:
                        </span>
                        <div className="flex justify-between">
                          <span>Total Suara Sah (Kandidat 1-4):</span>
                          <span className="font-bold text-slate-900">
                            {totalFormSuaraSah}
                          </span>
                        </div>
                        <div className="flex justify-between">
                          <span>Pemilih Hadir (Sah + Tidak Sah):</span>
                          <span className="font-bold text-slate-900">
                            {totalFormPemilihHadir}
                          </span>
                        </div>
                        <div className="flex justify-between border-t border-slate-200 pt-1 text-blue-900">
                          <span>Pemilih Tidak Hadir / Golput (Otomatis):</span>
                          <span className="font-bold">{calculatedGolput}</span>
                        </div>
                      </div>
                    </div>

                    {/* Action Buttons */}
                    <div className="flex justify-end space-x-3 pt-4 border-t border-slate-100">
                      <button
                        type="button"
                        onClick={resetForm}
                        className="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl text-xs transition-colors"
                      >
                        Batalkan
                      </button>
                      <button
                        type="submit"
                        disabled={isLoading}
                        className="px-5 py-2.5 gradient-brand text-white font-bold rounded-xl text-xs shadow-md hover:brightness-110 transition-all flex items-center"
                      >
                        {isLoading ? (
                          <React.Fragment>
                            <i className="fa-solid fa-circle-notch animate-spin mr-2"></i>{" "}
                            Mengirim Data...
                          </React.Fragment>
                        ) : (
                          <React.Fragment>
                            <i className="fa-solid fa-cloud-arrow-up mr-2"></i>{" "}
                            Simpan Data Suara TPS
                          </React.Fragment>
                        )}
                      </button>
                    </div>
                  </form>
                </div>
              )}

              {/* 3. REKAP DATA TPS TABLE */}
              {currentTab === "data" && (
                <div className="space-y-6 animate-fadeIn">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center space-y-3 sm:space-y-0">
                    <div>
                      <h3 className="text-lg font-extrabold text-slate-900">
                        Lembar Rekapitulasi Suara Per TPS
                      </h3>
                      <p className="text-xs text-slate-500">
                        Daftar rincian log audit perolehan suara dari seluruh
                        TPS desa Cibuntu.
                      </p>
                    </div>
                    <button
                      onClick={() => setIsAuthenticated(false)}
                      className="px-3 py-1 bg-rose-50 hover:bg-rose-100 border border-rose-200 text-rose-700 rounded-lg text-xs font-semibold transition-colors self-end"
                    >
                      <i className="fa-solid fa-lock-open mr-1.5"></i> Kunci
                      Admin
                    </button>
                  </div>

                  <div className="glass-card rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                    <div className="overflow-x-auto">
                      <table className="w-full text-left border-collapse text-xs">
                        <thead>
                          <tr className="bg-slate-100 text-slate-600 font-bold border-b border-slate-200 uppercase tracking-wider">
                            <th className="p-4">TPS</th>
                            <th className="p-4">Ketua KPPS</th>
                            <th className="p-4 text-center">DPT</th>
                            <th className="p-4 text-center bg-blue-50/50 text-blue-900">
                              Kand 1
                            </th>
                            <th className="p-4 text-center bg-teal-50/50 text-teal-900">
                              Kand 2
                            </th>
                            <th className="p-4 text-center bg-amber-50/50 text-amber-900">
                              Kand 3
                            </th>
                            <th className="p-4 text-center bg-rose-50/50 text-rose-900">
                              Kand 4
                            </th>
                            <th className="p-4 text-center font-bold">Sah</th>
                            <th className="p-4 text-center">Tidak Sah</th>
                            <th className="p-4 text-center">Golput</th>
                            <th className="p-4 text-center">Tingkat Hadir</th>
                            <th className="p-4 text-center">Aksi</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100 text-slate-700">
                          {tpsRecords.length === 0 ? (
                            <tr>
                              <td
                                colSpan="12"
                                className="p-8 text-center text-slate-400 font-semibold"
                              >
                                <i className="fa-solid fa-box-open text-3xl mb-2 block"></i>
                                Tidak ada rekaman TPS. Gunakan tab 'Input TPS'
                                untuk mengisi.
                              </td>
                            </tr>
                          ) : (
                            tpsRecords.map((r, idx) => {
                              const rate =
                                r.dpt > 0
                                  ? ((r.pemilihHadir / r.dpt) * 100).toFixed(1)
                                  : 0;
                              return (
                                <tr
                                  key={idx}
                                  className="hover:bg-slate-50 transition-colors"
                                >
                                  <td className="p-4 font-extrabold text-slate-950">
                                    {r.tps}
                                  </td>
                                  <td className="p-4 font-semibold text-slate-600">
                                    {r.ketua}
                                  </td>
                                  <td className="p-4 text-center font-bold">
                                    {r.dpt}
                                  </td>
                                  <td className="p-4 text-center font-bold bg-blue-50/30 text-blue-950">
                                    {r.kandidat1}
                                  </td>
                                  <td className="p-4 text-center font-bold bg-teal-50/30 text-teal-950">
                                    {r.kandidat2}
                                  </td>
                                  <td className="p-4 text-center font-bold bg-amber-50/30 text-amber-950">
                                    {r.kandidat3}
                                  </td>
                                  <td className="p-4 text-center font-bold bg-rose-50/30 text-rose-950">
                                    {r.kandidat4}
                                  </td>
                                  <td className="p-4 text-center font-bold text-slate-900 bg-slate-50">
                                    {r.suaraSah}
                                  </td>
                                  <td className="p-4 text-center font-medium text-slate-500">
                                    {r.tidakSah}
                                  </td>
                                  <td className="p-4 text-center font-medium text-slate-400">
                                    {r.golput}
                                  </td>
                                  <td className="p-4 text-center">
                                    <span
                                      className={`px-2 py-0.5 rounded-full font-bold text-[10px] ${
                                        Number(rate) > 85
                                          ? "bg-emerald-50 text-emerald-700"
                                          : "bg-blue-50 text-blue-700"
                                      }`}
                                    >
                                      {rate}%
                                    </span>
                                  </td>
                                  <td className="p-4 text-center">
                                    <button
                                      onClick={() => handleDeleteTps(r.tps)}
                                      className="p-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-lg border border-rose-200 transition-colors"
                                      title="Hapus rekaman TPS"
                                    >
                                      <i className="fa-solid fa-trash-can text-[11px]"></i>
                                    </button>
                                  </td>
                                </tr>
                              );
                            })
                          )}
                        </tbody>
                      </table>
                    </div>
                    {tpsRecords.length > 0 && (
                      <div className="bg-slate-50 p-4 border-t border-slate-200 text-[11px] font-bold text-slate-500 flex flex-wrap justify-between items-center gap-2">
                        <span>JUMLAH REKAPITULASI DARI {tpsTerinput} TPS</span>
                        <div className="flex space-x-4">
                          <span>
                            DPT TOTAL:{" "}
                            <span className="text-slate-950 font-black">
                              {totalDpt}
                            </span>
                          </span>
                          <span>
                            TOTAL SUARA KANDIDAT:{" "}
                            <span className="text-slate-950 font-black">
                              {totalSuaraSahSemua}
                            </span>
                          </span>
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {}
              {/* 4. CONFIGURATION / DEVELOPER HUB */}
              {currentTab === "config" && (
                <div className="space-y-6 animate-fadeIn">
                  <div>
                    <h3 className="text-lg font-extrabold text-slate-900">
                      Pengaturan API Google Apps Script & Deployment GitHub
                    </h3>
                    <p className="text-xs text-slate-500">
                      Hubungkan halaman statis GitHub Pages Anda dengan Database
                      Google Sheets melalui API GAS.
                    </p>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    {/* Left Panel: App URL setting */}
                    <div className="lg:col-span-1 space-y-4">
                      <div className="glass-card p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                        <h4 className="text-xs font-black text-slate-800 uppercase tracking-widest">
                          URL Apps Script API
                        </h4>

                        <div>
                          <label className="block text-[10px] text-slate-500 font-bold uppercase mb-1">
                            Spreadsheet ID Terpilih
                          </label>
                          <div className="p-2.5 bg-slate-50 rounded-lg text-xs font-mono break-all text-slate-600 border border-slate-200">
                            {spreadsheetId}
                          </div>
                        </div>

                        <div>
                          <label className="block text-[10px] text-slate-500 font-bold uppercase mb-1.5">
                            Web App URL *
                          </label>
                          <input
                            type="url"
                            placeholder="https://script.google.com/macros/s/.../exec"
                            value={webAppUrl}
                            onChange={(e) => {
                              setWebAppUrl(e.target.value);
                              localStorage.setItem(
                                "pilkades_gas_url",
                                e.target.value,
                              );
                              if (!e.target.value) setApiConnected(false);
                            }}
                            className="w-full px-3 py-2 border border-slate-300 rounded-xl text-xs font-mono outline-none focus:ring-2 focus:ring-blue-500"
                          />
                          <p className="text-[10px] text-slate-400 mt-1.5 leading-relaxed">
                            Masukkan alamat URL web app hasil deploy Apps Script
                            Anda untuk sinkronisasi database langsung.
                          </p>
                        </div>

                        <button
                          onClick={() => fetchLiveData(webAppUrl)}
                          disabled={!webAppUrl || isLoading}
                          className="w-full py-2 bg-blue-900 hover:bg-blue-950 text-white font-bold rounded-xl text-xs transition-all flex items-center justify-center"
                        >
                          {isLoading ? (
                            <i className="fa-solid fa-circle-notch animate-spin mr-1.5"></i>
                          ) : (
                            <i className="fa-solid fa-plug mr-1.5"></i>
                          )}
                          Uji & Hubungkan API
                        </button>
                      </div>

                      <div className="glass-card p-5 rounded-2xl shadow-sm border border-slate-200 space-y-3 text-xs leading-relaxed">
                        <h4 className="text-[11px] font-black text-emerald-800 uppercase tracking-wider flex items-center">
                          <i className="fa-solid fa-shield-halved mr-1.5"></i>{" "}
                          Keamanan & Kode PIN
                        </h4>
                        <p className="text-slate-600 text-[11px]">
                          Demi mencegah sabotase suara oleh pengunjung biasa,
                          halaman input & hapus dilindungi PIN Keamanan.
                        </p>
                        <div className="p-2.5 bg-emerald-50 rounded-lg border border-emerald-100 text-emerald-900 font-bold text-center">
                          PIN Default Simulasi: 2026
                        </div>
                      </div>
                    </div>

                    {/* Right Panel: Code.gs copy code and guide */}
                    <div className="lg:col-span-2 space-y-4">
                      <div className="glass-card p-5 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                        <div className="flex justify-between items-center flex-wrap gap-2">
                          <h4 className="text-xs font-black text-slate-800 uppercase tracking-widest">
                            Langkah 1: Salin Kode `kode.gs`
                          </h4>
                          <button
                            onClick={() => {
                              navigator.clipboard.writeText(backendCode);
                              showToast(
                                "Kode Server GAS disalin ke clipboard!",
                                "success",
                              );
                            }}
                            className="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 rounded border border-slate-300 text-[10px] text-slate-700 font-bold transition-all"
                          >
                            <i className="fa-regular fa-copy mr-1"></i> Copy
                            Code
                          </button>
                        </div>

                        <div className="relative">
                          <pre className="p-4 bg-slate-900 text-emerald-400 rounded-xl overflow-x-auto text-[10px] font-mono h-[250px] leading-relaxed select-all">
                            {backendCode}
                          </pre>
                        </div>

                        <div className="space-y-3.5 pt-2">
                          <h4 className="text-xs font-black text-slate-800 uppercase tracking-widest">
                            Langkah 2: Deployment Panduan
                          </h4>
                          <ol className="list-decimal pl-4 text-xs text-slate-600 space-y-2 leading-relaxed">
                            <li>
                              Buka Google Spreadsheet Pilkades Anda:{" "}
                              <a
                                href={`https://docs.google.com/spreadsheets/d/${spreadsheetId}`}
                                target="_blank"
                                className="text-blue-900 underline font-semibold"
                              >
                                Buka Spreadsheet
                              </a>
                              .
                            </li>
                            <li>
                              Buka menu <strong>Ekstensi (Extensions)</strong>{" "}
                              &gt; pilih <strong>Apps Script</strong>.
                            </li>
                            <li>
                              Hapus semua kode bawaan di dalam berkas default{" "}
                              <code className="bg-slate-100 px-1 rounded text-red-600">
                                Code.gs
                              </code>
                              , lalu <strong>tempelkan (paste)</strong> seluruh
                              kode di atas.
                            </li>
                            <li>
                              Klik tombol <strong>Deploy (Terapkan)</strong> di
                              kanan atas &gt; pilih{" "}
                              <strong>Deployment Baru (New Deployment)</strong>.
                            </li>
                            <li>
                              Pilih Jenis sebagai{" "}
                              <strong>Aplikasi Web (Web App)</strong>. Isikan
                              konfigurasi:
                              <ul className="list-disc pl-5 mt-1 space-y-1 text-[11px]">
                                <li>
                                  <strong>
                                    Jalankan Sebagai (Execute as):
                                  </strong>{" "}
                                  "Saya" (Akun Google Anda).
                                </li>
                                <li>
                                  <strong>
                                    Siapa yang memiliki akses (Who has access):
                                  </strong>{" "}
                                  "Siapa saja" (Anyone).
                                </li>
                              </ul>
                            </li>
                            <li>
                              Klik <strong>Terapkan (Deploy)</strong>. Berikan
                              izin otorisasi saat diminta (Pilih
                              Advanced/Lanjutan &gt; Go to Pilkades (unsafe)).
                            </li>
                            <li>
                              Salin URL Aplikasi Web yang diberikan, lalu paste
                              di kolom input{" "}
                              <strong>URL Apps Script API</strong> di samping
                              kiri!
                            </li>
                          </ol>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </main>

            {/* Footer */}
            <footer className="bg-slate-900 text-slate-400 py-6 border-t border-slate-800 text-center text-xs mt-12">
              <div className="max-width-7xl mx-auto px-4 space-y-2">
                <p className="font-bold text-slate-300">
                  Pilkades Desa Cibuntu 2026 - Panitia Pemilihan Kepala Desa
                </p>
                <p className="text-[10px] text-slate-500">
                  Aplikasi ditenagai oleh Google Apps Script JSON API & GitHub
                  Pages. 100% Serverless & Efisien.
                </p>
              </div>
            </footer>

            {/* PIN Security Modal */}
            {showPinModal && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-filter backdrop-blur-sm flex items-center justify-center p-4 z-50">
                <div className="bg-white rounded-2xl max-w-sm w-full p-6 shadow-2xl border border-slate-100 space-y-4 animate-scaleUp">
                  <div className="text-center">
                    <div className="mx-auto w-12 h-12 bg-amber-50 text-amber-600 rounded-full flex items-center justify-center text-xl mb-3">
                      <i className="fa-solid fa-lock"></i>
                    </div>
                    <h3 className="text-base font-extrabold text-slate-900">
                      Verifikasi PIN Admin
                    </h3>
                    <p className="text-xs text-slate-500 mt-1">
                      Anda mengakses menu khusus Panitia/Admin. Masukkan PIN
                      keamanan Anda.
                    </p>
                  </div>

                  <div>
                    <input
                      type="password"
                      placeholder="Ketik PIN Default: 2026"
                      value={authPin}
                      onChange={(e) => setAuthPin(e.target.value)}
                      onKeyDown={(e) => e.key === "Enter" && verifyPIN()}
                      className="w-full px-4 py-2 border border-slate-300 rounded-xl text-center text-lg font-bold tracking-widest outline-none focus:ring-2 focus:ring-blue-500"
                    />
                  </div>

                  <div className="flex space-x-2">
                    <button
                      onClick={() => {
                        setShowPinModal(false);
                        setPendingTab(null);
                      }}
                      className="flex-1 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold rounded-xl text-xs transition-colors"
                    >
                      Batal
                    </button>
                    <button
                      onClick={verifyPIN}
                      className="flex-1 py-2.5 gradient-brand text-white font-bold rounded-xl text-xs shadow-md transition-all"
                    >
                      Verifikasi PIN
                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const container = document.getElementById("root");
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    </script>
  </body>
</html>
